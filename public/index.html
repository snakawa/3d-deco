<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Deco - Client Registration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="loginSection" class="section">
            <h1>Welcome to 3D Deco</h1>
            <p>Sign in with your Google account to continue</p>
            <a href="/auth/google" class="btn btn-google">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </a>
        </div>

        <div id="dashboardSection" class="section" style="display:none;">
            <h1>Dashboard</h1>
            <div class="profile-card">
                <div class="profile-header">
                    <img id="profilePic" src="" alt="Profile Picture" class="profile-pic">
                    <div class="profile-info">
                        <h2 id="userName"></h2>
                        <p id="userEmail"></p>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="Enter your phone number" required>
                    <button onclick="updatePhoneNumber()" class="btn btn-primary">Save Phone Number</button>
                </div>
                
                <div id="successMessage" class="message success" style="display:none;"></div>
                <div id="errorMessage" class="message error" style="display:none;"></div>
            </div>
            
            <button onclick="logout()" class="btn btn-secondary">Logout</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';

        async function checkAuth() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const user = await response.json();
                    showDashboard(user);
                } else {
                    showLoginSection();
                }
            } catch (error) {
                console.error('Auth check error:', error);
                showLoginSection();
            }
        }

        function showLoginSection() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('dashboardSection').style.display = 'none';
        }

        function showDashboard(user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            
            if (user.profilePicture) {
                document.getElementById('profilePic').src = user.profilePicture;
            }
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('phoneNumber').value = user.phoneNumber || '';
        }

        async function updatePhoneNumber() {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            
            if (!phoneNumber) {
                showError('Please enter a phone number');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/clients/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ phoneNumber })
                });

                if (response.ok) {
                    const data = await response.json();
                    showSuccess('Phone number updated successfully!');
                    setTimeout(() => hideMessages(), 3000);
                } else {
                    const error = await response.json();
                    showError(error.error || 'Failed to update phone number');
                }
            } catch (error) {
                console.error('Update error:', error);
                showError('Error updating phone number');
            }
        }

        async function logout() {
            try {
                const response = await fetch(`${API_URL}/auth/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });

                if (response.ok) {
                    showLoginSection();
                    checkAuth();
                }
            } catch (error) {
                console.error('Logout error:', error);
            }
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }

        // Check authentication on page load
        checkAuth();
    </script>
</body>
</html>
